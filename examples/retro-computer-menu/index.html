<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retro Computer Menu</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="screen">
      <section id="boot-sequence" class="boot-sequence" aria-live="polite">
        <div class="boot-computer" aria-hidden="true">
          <div class="boot-monitor">
            <div class="boot-glow"></div>
            <span>BOOTING...</span>
          </div>
          <div class="boot-base"></div>
        </div>
        <div class="boot-progress" aria-hidden="true">
          <div class="boot-progress-fill"></div>
        </div>
        <p class="boot-line">ZBD OS v0.1...</p>
        <p class="boot-line">Checking memory.................. OK</p>
        <p class="boot-line">Loading wallet services.......... OK</p>
        <p class="boot-line">Starting game environment........ OK</p>
        <p class="boot-line">Launching desktop...</p>
      </section>

      <section id="desktop" class="desktop hidden" aria-label="Desktop applications">
        <header class="top-bar">
          <span>ZBD Retro Desktop</span>
          <span id="clock"></span>
        </header>

        <div class="app-grid">
          <button class="app-icon" data-app="Crypto Wallet">💰<span>Crypto Wallet</span></button>
          <button class="app-icon" data-app="Game Menu">🕹️<span>Game Menu</span></button>
          <button class="app-icon" data-app="Settings">⚙️<span>Settings</span></button>
          <button class="app-icon" data-app="Store">🛒<span>Store</span></button>
          <button class="app-icon" data-app="Achievments">🏆<span>Achievments</span></button>
          <button class="app-icon" data-app="Info">ℹ️<span>Info</span></button>
        </div>
      </section>

      <dialog id="app-modal" class="modal">
        <article class="modal-window">
          <header>
            <h2 id="modal-title">Coming Soon</h2>
          </header>

          <section id="coming-soon-panel">
            <img src="./coming-soon.svg" alt="Coming soon" />
          </section>

          <section id="game-menu-panel" class="game-menu hidden">
            <div class="game-toolbar">
              <button data-game-tab="tic" class="tab-btn active">Tic-Tac-Toe</button>
              <button data-game-tab="chess" class="tab-btn">Chess</button>
            </div>

            <section id="tic-tab" class="game-tab active">
              <div class="controls-row">
                <label>
                  CPU Intelligence
                  <input id="tic-intelligence" type="range" min="1" max="5" value="4" />
                  <span id="tic-level">4/5</span>
                </label>
                <button id="tic-reset" type="button">New Game</button>
              </div>
              <p id="tic-status" class="status-line"></p>
              <div id="tic-board" class="tic-board" role="grid" aria-label="Tic Tac Toe board"></div>
              <p id="tic-commentary" class="commentary"></p>
            </section>

            <section id="chess-tab" class="game-tab hidden">
              <div class="controls-row">
                <label>
                  Bot Difficulty
                  <select id="chess-difficulty">
                    <option value="easy">Easy</option>
                    <option value="normal" selected>Normal</option>
                    <option value="hard">Hard</option>
                  </select>
                </label>
                <button id="chess-reset" type="button">New Game</button>
              </div>
              <p id="chess-status" class="status-line"></p>
              <div id="chess-board" class="chess-board" role="grid" aria-label="Chess board"></div>
              <p id="chess-commentary" class="commentary"></p>
            </section>
          </section>

          <button id="close-modal" autofocus>Close</button>
        </article>
      </dialog>
    </main>

    <script type="module" src="./script.js"></script>
  </body>
</html>
